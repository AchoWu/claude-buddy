<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Buddy Remote</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1e1e1e; color: #fff; height: 100vh; display: flex; flex-direction: column; }
  #header { background: #2d2d2d; padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #444; }
  #header h1 { font-size: 16px; font-weight: 600; color: #D77757; }
  #status { font-size: 12px; color: #999; }
  #status.connected { color: #4EBA65; }
  #status.connected::before { content: "\25CF "; }
  #status.disconnected { color: #FF6B80; }
  #status.disconnected::before { content: "\25CB "; }
  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
  .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; word-wrap: break-word; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: #D77757; color: #fff; border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: #373737; color: #eee; border-bottom-left-radius: 4px; }
  .msg.tool { align-self: flex-start; background: #2a3a2a; color: #8f8; font-family: monospace; font-size: 12px; padding: 6px 10px; border-radius: 6px; }
  .msg.error { align-self: center; background: #3a2020; color: #FF6B80; font-size: 12px; }
  .msg.system { align-self: center; background: transparent; color: #666; font-size: 12px; font-style: italic; }
  #input-bar { display: flex; gap: 8px; padding: 12px 16px; background: #2d2d2d; border-top: 1px solid #444; }
  #input { flex: 1; background: #1e1e1e; border: 1px solid #555; border-radius: 8px; padding: 10px 14px; color: #fff; font-size: 14px; outline: none; resize: none; min-height: 20px; max-height: 120px; }
  #input:focus { border-color: #D77757; }
  #send-btn { background: #D77757; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; }
  #send-btn:hover { background: #EB9F7F; }
  #send-btn:disabled { background: #555; cursor: not-allowed; }
</style>
</head>
<body>
<div id="header">
  <h1>Claude Buddy</h1>
  <span id="status" class="disconnected">Disconnected</span>
</div>
<div id="messages"></div>
<div id="input-bar">
  <textarea id="input" rows="1" placeholder="Type a message... (Enter to send, Shift+Enter for newline)"></textarea>
  <button id="send-btn">Send</button>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const statusEl = document.getElementById('status');

let ws = null;
let msgIdCounter = 1;
let currentAssistantEl = null;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${proto}//${location.host}`;
  ws = new WebSocket(url);

  ws.onopen = () => {
    statusEl.textContent = 'Connected';
    statusEl.className = 'connected';
    addMsg('system', 'Connected to Claude Buddy');
    // Load history
    send('getHistory', { limit: 30 });
  };

  ws.onclose = () => {
    statusEl.textContent = 'Disconnected';
    statusEl.className = 'disconnected';
    addMsg('system', 'Disconnected. Reconnecting in 3s...');
    setTimeout(connect, 3000);
  };

  ws.onerror = () => {};

  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      handleMessage(data);
    } catch(e) {}
  };
}

function send(method, params) {
  if (!ws || ws.readyState !== 1) return;
  const id = msgIdCounter++;
  ws.send(JSON.stringify({ jsonrpc: '2.0', method, params, id }));
  return id;
}

function handleMessage(data) {
  // JSON-RPC response
  if (data.id && data.result) {
    if (data.result.messages) {
      // History loaded
      data.result.messages.forEach(m => addMsg(m.role, m.content));
      scrollBottom();
    }
    if (data.result.type === 'command_result') {
      addMsg('assistant', data.result.text);
    }
    return;
  }

  // JSON-RPC notification
  const method = data.method;
  const params = data.params || {};

  if (method === 'response_chunk') {
    if (!currentAssistantEl) {
      currentAssistantEl = addMsg('assistant', '');
    }
    currentAssistantEl.textContent += params.text;
    scrollBottom();
  }
  else if (method === 'response_text') {
    if (currentAssistantEl) {
      currentAssistantEl.textContent = params.text;
    } else {
      addMsg('assistant', params.text);
    }
    currentAssistantEl = null;
    sendBtn.disabled = false;
  }
  else if (method === 'tool_start') {
    addMsg('tool', `[${params.name}] ${JSON.stringify(params.input || {}).slice(0, 100)}`);
  }
  else if (method === 'tool_result') {
    addMsg('tool', `[${params.name}] ${(params.output || '').slice(0, 200)}`);
  }
  else if (method === 'state_changed') {
    if (params.state === 'idle') {
      sendBtn.disabled = false;
      currentAssistantEl = null;
    } else {
      sendBtn.disabled = true;
    }
  }
  else if (method === 'error') {
    addMsg('error', params.message);
    sendBtn.disabled = false;
    currentAssistantEl = null;
  }
  else if (method === 'permission_request') {
    if (confirm(`Allow ${params.tool_name}?\n${JSON.stringify(params.input)}`)) {
      send('permissionResponse', { request_id: params.request_id, approved: true });
    } else {
      send('permissionResponse', { request_id: params.request_id, approved: false });
    }
  }
}

function addMsg(role, text) {
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  el.textContent = text;
  messagesEl.appendChild(el);
  scrollBottom();
  return el;
}

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;
  addMsg('user', text);
  send('sendMessage', { text });
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  currentAssistantEl = null;
}

sendBtn.onclick = sendMessage;
inputEl.onkeydown = (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
};
inputEl.oninput = () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
};

connect();
</script>
</body>
</html>
